<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F1923">
<title>KinéScope — Connexion</title>
<style>
:root{
  --bg:#0F1923;--surf:#16222E;--surf2:#1E2F40;--surf3:#243647;
  --tx:#E8EDF2;--tx2:#8FA3B4;--tx3:#5A7080;
  --acc:#2DD4BF;--acc2:#0EA5E9;--acc3:#F59E0B;
  --red:#F87171;--green:#34D399;--brd:#243647;
  --r:14px;--rs:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);}

/* SCREENS */
.screen{display:none;flex-direction:column;min-height:100vh;padding:calc(var(--safe-t)+20px) 24px calc(var(--safe-b)+24px);max-width:420px;margin:0 auto;}
.screen.active{display:flex;}

/* BG DECO */
.bg-deco{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.bg-deco::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,.1) 0%,transparent 70%);top:-150px;left:-150px;}
.bg-deco::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,.07) 0%,transparent 70%);bottom:-100px;right:-100px;}
.screen>*{position:relative;z-index:1;}

/* LOGO */
.logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px;margin-top:16px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(45,212,191,.3);flex-shrink:0;}
.logo-title{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.logo-title em{font-style:normal;color:var(--acc);}
.logo-sub{font-size:13px;color:var(--tx3);margin-bottom:36px;}

/* TABS */
.auth-tabs{display:flex;background:var(--surf2);border-radius:var(--r);padding:4px;gap:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;color:var(--tx2);background:transparent;transition:all .2s;}
.auth-tab.on{background:var(--surf3);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* FORM */
.fl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:6px;}
.fi{width:100%;background:var(--surf2);border:1.5px solid var(--brd);border-radius:var(--rs);padding:14px 16px;font-size:16px;color:var(--tx);font-family:var(--font);outline:none;-webkit-appearance:none;margin-bottom:16px;transition:border-color .15s;}
.fi:focus{border-color:var(--acc);}
.fi::placeholder{color:var(--tx3);}
.fi-row{display:flex;gap:10px;margin-bottom:16px;}
.fi-row .fi{margin-bottom:0;}

/* SECTION TITRE */
.form-section{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:1px;text-transform:uppercase;margin:8px 0 16px;display:flex;align-items:center;gap:8px;}
.form-section::after{content:'';flex:1;height:1px;background:var(--brd);}

/* BOUTONS */
.btn-main{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:var(--r);padding:16px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;box-shadow:0 4px 20px rgba(45,212,191,.35);transition:transform .1s,box-shadow .1s;margin-top:8px;}
.btn-main:active{transform:scale(.97);box-shadow:0 2px 8px rgba(45,212,191,.2);}
.btn-main:disabled{opacity:.4;pointer-events:none;}

/* ERREUR */
.err-msg{background:rgba(248,113,113,.12);border:1.5px solid rgba(248,113,113,.3);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.err-msg.show{display:block;}

/* SUCCESS */
.ok-msg{background:rgba(52,211,153,.1);border:1.5px solid rgba(52,211,153,.3);border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--green);margin-bottom:16px;display:none;}
.ok-msg.show{display:block;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
.spin{width:36px;height:36px;border:3px solid var(--surf3);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* MOT DE PASSE */
.fi-pw-wrap{position:relative;margin-bottom:16px;}
.fi-pw-wrap .fi{margin-bottom:0;padding-right:50px;}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;padding:4px;}

/* HINT */
.field-hint{font-size:11px;color:var(--tx3);margin-top:-10px;margin-bottom:14px;padding-left:2px;}

/* DIVIDER */
.divider{height:1px;background:var(--brd);margin:20px 0;}

.forgot-link{text-align:center;font-size:13px;color:var(--tx3);margin-top:14px;cursor:pointer;text-decoration:none;display:block;}
.divider-or{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--tx3);font-size:12px;font-weight:600;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--brd);}
.btn-google{width:100%;background:var(--surf2);color:var(--tx);border:1.5px solid var(--brd);border-radius:var(--r);padding:14px 20px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:border-color .15s,transform .1s;}
.btn-google:active{transform:scale(.97);border-color:var(--acc);}
.btn-google svg{flex-shrink:0;}
.forgot-link:active{color:var(--acc);}
</style>
</head>
<body>
<div class="bg-deco"></div>
<div id="loading"><div class="spin"></div><p style="color:var(--tx2);font-size:14px">Chargement…</p></div>

<!-- ══ CONNEXION / INSCRIPTION ══ -->
<div class="screen active" id="sc-auth">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none" width="26" height="26">
        <path d="M20 6C20 6 8 14 8 24a12 12 0 0024 0C32 14 20 6 20 6z" fill="white" fill-opacity=".9"/>
        <path d="M20 14v12M14 20h12" stroke="#0F1923" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-title">Kiné<em>Scope</em></div>
  </div>
  <div class="logo-sub">Plateforme EBP · Kinésithérapeutes</div>

  <div class="auth-tabs">
    <button class="auth-tab on" id="tab-login" onclick="switchTab('login')">Connexion</button>
    <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Inscription</button>
  </div>

  <!-- ERREUR / OK -->
  <div class="err-msg" id="err-msg"></div>
  <div class="ok-msg" id="ok-msg"></div>

  <!-- CONNEXION -->
  <div id="form-login">
    <label class="fl">Adresse e-mail</label>
    <input class="fi" type="email" id="login-email" placeholder="votre@email.com" autocomplete="email">
    <label class="fl">Mot de passe</label>
    <div class="fi-pw-wrap">
      <input class="fi" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
      <button class="pw-toggle" onclick="togglePw('login-pw',this)" type="button">👁</button>
    </div>
    <button class="btn-main" onclick="doLogin()">Se connecter</button>
    <a class="forgot-link" onclick="doReset()">Mot de passe oublié ?</a>
    <div class="divider-or">ou</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continuer avec Google
    </button>
  </div>

  <!-- INSCRIPTION -->
  <div id="form-signup" style="display:none">
    <div class="form-section">Compte</div>
    <label class="fl">Adresse e-mail</label>
    <input class="fi" type="email" id="su-email" placeholder="votre@email.com" autocomplete="email">
    <label class="fl">Mot de passe</label>
    <div class="fi-pw-wrap">
      <input class="fi" type="password" id="su-pw" placeholder="8 caractères minimum" autocomplete="new-password">
      <button class="pw-toggle" onclick="togglePw('su-pw',this)" type="button">👁</button>
    </div>
    <div class="field-hint">Minimum 8 caractères</div>
    <label class="fl">Confirmer le mot de passe</label>
    <div class="fi-pw-wrap">
      <input class="fi" type="password" id="su-pw2" placeholder="••••••••" autocomplete="new-password">
      <button class="pw-toggle" onclick="togglePw('su-pw2',this)" type="button">👁</button>
    </div>

    <div class="form-section">Identité professionnelle</div>
    <div class="fi-row">
      <div style="flex:1"><label class="fl">Prénom</label><input class="fi" type="text" id="su-prenom" placeholder="Marie" autocomplete="given-name"></div>
      <div style="flex:1"><label class="fl">Nom</label><input class="fi" type="text" id="su-nom" placeholder="Dupont" autocomplete="family-name"></div>
    </div>
    <label class="fl">Titre / Spécialité</label>
    <input class="fi" type="text" id="su-titre" placeholder="Kinésithérapeute DE" autocomplete="off">

    <div class="form-section">Cabinet</div>
    <label class="fl">Nom du cabinet</label>
    <input class="fi" type="text" id="su-cabinet" placeholder="Cabinet de kinésithérapie …" autocomplete="organization">
    <label class="fl">Adresse</label>
    <input class="fi" type="text" id="su-adresse" placeholder="12 rue de la Santé, 75014 Paris" autocomplete="street-address">
    <div class="fi-row">
      <div style="flex:1"><label class="fl">Téléphone</label><input class="fi" type="tel" id="su-tel" placeholder="+33 6 …" autocomplete="tel"></div>
      <div style="flex:1"><label class="fl">RPPS / INAMI</label><input class="fi" type="text" id="su-rpps" placeholder="Optionnel" autocomplete="off"></div>
    </div>

    <button class="btn-main" onclick="doSignup()">Créer mon compte</button>
    <div class="divider-or">ou</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continuer avec Google
    </button>
  </div>
</div>

<!-- ══ PROFIL (compléter après 1ère connexion) ══ -->
<div class="screen" id="sc-profil">
  <div class="logo-wrap" style="margin-top:8px">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none" width="26" height="26">
        <path d="M20 6C20 6 8 14 8 24a12 12 0 0024 0C32 14 20 6 20 6z" fill="white" fill-opacity=".9"/>
        <path d="M20 14v12M14 20h12" stroke="#0F1923" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-title">Kiné<em>Scope</em></div>
  </div>
  <div class="logo-sub">Complétez votre profil pour continuer</div>
  <div class="err-msg" id="err-profil"></div>
  <div class="form-section">Identité professionnelle</div>
  <div class="fi-row">
    <div style="flex:1"><label class="fl">Prénom</label><input class="fi" type="text" id="p-prenom" placeholder="Marie"></div>
    <div style="flex:1"><label class="fl">Nom</label><input class="fi" type="text" id="p-nom" placeholder="Dupont"></div>
  </div>
  <label class="fl">Titre / Spécialité</label>
  <input class="fi" type="text" id="p-titre" placeholder="Kinésithérapeute DE">
  <div class="form-section">Cabinet</div>
  <label class="fl">Nom du cabinet</label>
  <input class="fi" type="text" id="p-cabinet" placeholder="Cabinet de kinésithérapie …">
  <label class="fl">Adresse</label>
  <input class="fi" type="text" id="p-adresse" placeholder="12 rue de la Santé, 75014 Paris">
  <div class="fi-row">
    <div style="flex:1"><label class="fl">Téléphone</label><input class="fi" type="tel" id="p-tel" placeholder="+33 6 …"></div>
    <div style="flex:1"><label class="fl">RPPS / INAMI</label><input class="fi" type="text" id="p-rpps" placeholder="Optionnel"></div>
  </div>
  <button class="btn-main" onclick="saveProfil()">Enregistrer et continuer →</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,sendPasswordResetEmail,onAuthStateChanged,GoogleAuthProvider,signInWithPopup}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyBxb76bIaud6w8iE4dZL2x_XGaUeDDImMc",authDomain:"kinescope-9df37.firebaseapp.com",projectId:"kinescope-9df37",storageBucket:"kinescope-9df37.firebasestorage.app",messagingSenderId:"279167842820",appId:"1:279167842820:web:86e0bf2f726fbaee531351"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

// ── Helpers UI ───────────────────────────────────────────
const showErr=(id,msg)=>{const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');};
const hideErr=(id)=>{document.getElementById(id).classList.remove('show');};
const showOk=(id,msg)=>{const el=document.getElementById(id);el.textContent=msg;el.classList.add('show');};
const ss=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');};
const loading=(on)=>document.getElementById('loading').style.display=on?'flex':'none';

window.switchTab=tab=>{
  document.getElementById('tab-login').classList.toggle('on',tab==='login');
  document.getElementById('tab-signup').classList.toggle('on',tab==='signup');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  hideErr('err-msg');document.getElementById('ok-msg').classList.remove('show');
};

window.togglePw=(id,btn)=>{
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
};

// ── Vérifier profil thérapeute ───────────────────────────
async function checkProfil(user){
  const ref=doc(db,'therapists',user.uid);
  const snap=await getDoc(ref);
  if(snap.exists()&&snap.data().nom){
    // Profil complet → index.html
    window.location.href='index.html';
  } else {
    // Pas de profil → écran profil
    ss('sc-profil');
  }
}

// ── Auth state ───────────────────────────────────────────
onAuthStateChanged(auth,user=>{
  loading(false);
  if(user){
    // Déjà connecté → vérifier profil
    checkProfil(user).catch(()=>{ss('sc-auth');});
  }
  // sinon on reste sur sc-auth
});

// ── CONNEXION ────────────────────────────────────────────
window.doLogin=async()=>{
  hideErr('err-msg');document.getElementById('ok-msg').classList.remove('show');
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!pw){showErr('err-msg','Veuillez remplir tous les champs.');return;}
  loading(true);
  try{
    await signInWithEmailAndPassword(auth,email,pw);
    // onAuthStateChanged prend le relais
  }catch(e){
    loading(false);
    const msgs={
      'auth/user-not-found':'Aucun compte trouvé pour cet e-mail.',
      'auth/wrong-password':'Mot de passe incorrect.',
      'auth/invalid-email':'Adresse e-mail invalide.',
      'auth/too-many-requests':'Trop de tentatives. Réessayez plus tard.',
      'auth/invalid-credential':'E-mail ou mot de passe incorrect.',
    };
    showErr('err-msg',msgs[e.code]||'Erreur de connexion. Vérifiez vos identifiants.');
  }
};

// ── INSCRIPTION ──────────────────────────────────────────
window.doSignup=async()=>{
  hideErr('err-msg');
  const email=document.getElementById('su-email').value.trim();
  const pw=document.getElementById('su-pw').value;
  const pw2=document.getElementById('su-pw2').value;
  const prenom=document.getElementById('su-prenom').value.trim();
  const nom=document.getElementById('su-nom').value.trim();
  const titre=document.getElementById('su-titre').value.trim();
  const cabinet=document.getElementById('su-cabinet').value.trim();
  const adresse=document.getElementById('su-adresse').value.trim();
  const tel=document.getElementById('su-tel').value.trim();
  const rpps=document.getElementById('su-rpps').value.trim();

  if(!email||!pw||!pw2){showErr('err-msg','E-mail et mot de passe requis.');return;}
  if(pw.length<8){showErr('err-msg','Le mot de passe doit contenir au moins 8 caractères.');return;}
  if(pw!==pw2){showErr('err-msg','Les mots de passe ne correspondent pas.');return;}
  if(!prenom||!nom){showErr('err-msg','Prénom et nom requis.');return;}

  loading(true);
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    const uid=cred.user.uid;
    await setDoc(doc(db,'therapists',uid),{
      email,prenom,nom,titre:titre||'Kinésithérapeute',
      cabinet:cabinet||'',adresse:adresse||'',tel:tel||'',rpps:rpps||'',
      pin:'',createdAt:new Date().toISOString(),uid
    });
    window.location.href='index.html';
  }catch(e){
    loading(false);
    const msgs={
      'auth/email-already-in-use':'Un compte existe déjà avec cet e-mail.',
      'auth/invalid-email':'Adresse e-mail invalide.',
      'auth/weak-password':'Mot de passe trop faible (8 caractères minimum).',
    };
    showErr('err-msg',msgs[e.code]||'Erreur lors de la création du compte.');
  }
};

// ── RESET MOT DE PASSE ───────────────────────────────────
window.doReset=async()=>{
  hideErr('err-msg');document.getElementById('ok-msg').classList.remove('show');
  const email=document.getElementById('login-email').value.trim();
  if(!email){showErr('err-msg','Entrez votre e-mail pour réinitialiser le mot de passe.');return;}
  loading(true);
  try{
    await sendPasswordResetEmail(auth,email);
    loading(false);
    showOk('ok-msg','E-mail de réinitialisation envoyé. Vérifiez votre boîte mail.');
  }catch(e){
    loading(false);
    showErr('err-msg','Impossible d\'envoyer l\'e-mail. Vérifiez l\'adresse saisie.');
  }
};

// ── GOOGLE AUTH ─────────────────────────────────────────────
window.doGoogle=async()=>{
  hideErr('err-msg');
  loading(true);
  try{
    const provider=new GoogleAuthProvider();
    const cred=await signInWithPopup(auth,provider);
    const user=cred.user;
    // Vérifier si profil existe déjà
    const snap=await getDoc(doc(db,'therapists',user.uid));
    if(snap.exists()&&snap.data().nom){
      window.location.href='index.html';
    } else {
      // Nouveau compte Google → créer profil de base depuis les infos Google
      const displayName=user.displayName||'';
      const parts=displayName.split(' ');
      const prenom=parts[0]||'';
      const nom=parts.slice(1).join(' ')||'';
      if(prenom&&nom){
        await setDoc(doc(db,'therapists',user.uid),{
          email:user.email,prenom,nom,
          titre:'Kinésithérapeute',cabinet:'',adresse:'',tel:'',rpps:'',
          pin:'',createdAt:new Date().toISOString(),uid:user.uid
        });
        window.location.href='index.html';
      } else {
        // Nom incomplet → écran profil pour compléter
        loading(false);
        ss('sc-profil');
      }
    }
  }catch(e){
    loading(false);
    if(e.code!=='auth/popup-closed-by-user'){
      showErr('err-msg','Erreur de connexion Google. Réessayez.');
    }
  }
};

// ── SAUVEGARDER PROFIL (si manquant) ─────────────────────
window.saveProfil=async()=>{
  hideErr('err-profil');
  const prenom=document.getElementById('p-prenom').value.trim();
  const nom=document.getElementById('p-nom').value.trim();
  if(!prenom||!nom){showErr('err-profil','Prénom et nom requis.');return;}
  const user=auth.currentUser;if(!user)return;
  loading(true);
  try{
    await setDoc(doc(db,'therapists',user.uid),{
      prenom,nom,
      titre:document.getElementById('p-titre').value.trim()||'Kinésithérapeute',
      cabinet:document.getElementById('p-cabinet').value.trim(),
      adresse:document.getElementById('p-adresse').value.trim(),
      tel:document.getElementById('p-tel').value.trim(),
      rpps:document.getElementById('p-rpps').value.trim(),
      email:user.email,pin:'',uid:user.uid,
      createdAt:new Date().toISOString()
    },{merge:true});
    window.location.href='index.html';
  }catch(e){
    loading(false);
    showErr('err-profil','Erreur lors de la sauvegarde. Réessayez.');
  }
};
</script>
